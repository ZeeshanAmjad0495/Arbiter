# Auto-provision the OSS Loki (logs) + Prometheus (metrics) datasources so Grafana
# alone covers what Datadog/Splunk would — for free.
apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
